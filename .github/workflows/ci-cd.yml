name: CI/CD Pipeline

on:
  push:
    branches: [ main ]   # ❗ removed pull_request (important)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    
    - name: Train model
      run: |
        cd backend
        python train.py
    
    - name: Test model loading
      run: |
        cd backend
        python -c "import joblib; joblib.load('model.pkl'); print('Model OK')"

    # ✅ DEBUG STEP (VERY IMPORTANT)
    - name: Debug secrets
      run: |
        echo "USERNAME = ${{ secrets.DOCKERHUB_USERNAME }}"
        echo "Token exists check"
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/hospital-readmission:latest
